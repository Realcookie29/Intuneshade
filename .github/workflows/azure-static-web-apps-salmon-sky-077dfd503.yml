name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build frontend → dist/
      - name: Build frontend
        run: npm ci && npm run build

      # SWA config must live inside the static folder
      - name: Copy SWA config into dist
        run: cp staticwebapp.config.json dist/

      # Remove root node_modules so Oryx doesn't count them as static files
      - name: Clean root node_modules
        run: rm -rf node_modules

      # app_location: pre-built dist/ (no package.json → plain static site, correct MIME types)
      # api_location: api/ → Oryx installs dependencies (npm install) then runs npm run build (tsc)
      # All SDK deps are in "dependencies" so Oryx installs them in production mode.
      # typescript is also in "dependencies" so Oryx can run tsc.
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_SKY_077DFD503 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist"
          api_location: "api"
          output_location: "."

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_SKY_077DFD503 }}
          action: "close"
